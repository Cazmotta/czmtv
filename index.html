<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>overblockk TV</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080810;--s1:#111120;--s2:#1a1a30;
  --accent:#5b6ef5;--accent2:#c45bff;--green:#3ecf8e;
  --red:#f55b5b;--text:#f4f4ff;--sub:#8888bb;--border:rgba(91,110,245,0.2);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:1920px;height:1080px;overflow:hidden;}
body{
  font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);
  background-image:
    radial-gradient(ellipse 900px 500px at 10% -10%,rgba(91,110,245,0.1) 0%,transparent 70%),
    radial-gradient(ellipse 600px 400px at 90% 110%,rgba(196,91,255,0.08) 0%,transparent 60%);
}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:24px 80px;border-bottom:1px solid var(--border);
  background:rgba(8,8,16,0.85);backdrop-filter:blur(16px);
}
.logo{font-size:36px;font-weight:900;letter-spacing:-2px;
  background:linear-gradient(120deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#clock{font-size:52px;font-weight:300;letter-spacing:-2px;line-height:1;}
#date-str{font-size:18px;color:var(--sub);text-align:right;margin-top:4px;}
.conn{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:600;
  background:rgba(62,207,142,0.1);border:1px solid rgba(62,207,142,0.3);
  border-radius:10px;padding:10px 20px;color:var(--green);}
.conn-dot{width:8px;height:8px;background:var(--green);border-radius:50%;
  animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

/* ── HOME ── */
#home{padding:40px 80px;height:calc(1080px - 113px);overflow:hidden;}
.sec-label{font-size:13px;font-weight:700;letter-spacing:4px;text-transform:uppercase;
  color:var(--sub);margin-bottom:20px;}
.apps{display:grid;grid-template-columns:repeat(8,1fr);gap:16px;margin-bottom:44px;}
.app{
  background:var(--s1);border:2px solid var(--border);border-radius:22px;
  padding:24px 12px 20px;text-align:center;display:flex;flex-direction:column;
  align-items:center;gap:12px;transition:border-color .2s,transform .2s,background .2s;
}
.app.focused{
  border-color:var(--accent2);background:var(--s2);transform:scale(1.07);
  box-shadow:0 0 0 6px rgba(196,91,255,0.18),0 8px 32px rgba(196,91,255,0.2);
}
.app-ico{width:72px;height:72px;border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:30px;font-weight:900;color:#fff;}
.app-name{font-size:16px;font-weight:600;}

/* ── LAUNCH OVERLAY ── */
#launch{
  position:absolute;inset:0;background:var(--bg);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:28px;
  background-image:radial-gradient(ellipse 700px 500px at 50% 40%,rgba(91,110,245,0.15) 0%,transparent 70%);
}
#launch.on{display:flex;}
.launch-ico{font-size:100px;line-height:1;}
.launch-name{font-size:64px;font-weight:900;}
.launch-sub{font-size:26px;color:var(--sub);}
.launch-bar{width:400px;height:5px;background:var(--s2);border-radius:3px;overflow:hidden;margin-top:8px;}
.launch-fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:width 2.2s ease;}

/* ── TOAST ── */
#toast{
  position:absolute;bottom:60px;left:50%;transform:translateX(-50%);
  background:var(--s2);border:1.5px solid var(--border);border-radius:18px;
  padding:20px 44px;font-size:24px;font-weight:600;
  opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;
}
#toast.on{opacity:1;}

/* ── CURSOR ── */
#cursor{
  position:fixed;pointer-events:none;z-index:9999;
  border:3px solid var(--accent2);border-radius:20px;
  box-shadow:0 0 0 5px rgba(196,91,255,0.18),0 0 24px rgba(196,91,255,0.3);
  background:rgba(196,91,255,0.05);
  transition:all 0.15s cubic-bezier(.4,0,.2,1);
  display:none;
}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="logo">⬡ overblockk TV</div>
  </div>
  <div class="conn"><div class="conn-dot"></div>Ao Vivo</div>
  <div>
    <div id="clock">00:00</div>
    <div id="date-str"></div>
  </div>
</div>

<div id="home">
  <div class="sec-label">Aplicativos</div>
  <div class="apps" id="apps-grid"></div>
</div>

<div id="launch">
  <div class="launch-ico" id="l-ico"></div>
  <div class="launch-name" id="l-name"></div>
  <div class="launch-sub">Use o celular para abrir ↓</div>
  <div class="launch-bar"><div class="launch-fill" id="l-fill"></div></div>
</div>

<div id="toast"></div>
<div id="cursor"></div>

<script>
const APPS=[
  {name:'YouTube',   ico:'▶',  bg:'#cc0000',url:'youtube://'},
  {name:'Twitch',    ico:'🎮', bg:'#9147ff',url:'twitch://'},
  {name:'Netflix',   ico:'N',  bg:'#e50914',url:'nflx://'},
  {name:'Prime',     ico:'🎬', bg:'#00a8e0',url:'primevideo://'},
  {name:'Spotify',   ico:'♪',  bg:'#1db954',url:'spotify://'},
  {name:'Globoplay', ico:'G',  bg:'#cc0000',url:'https://globoplay.globo.com'},
  {name:'Disney+',   ico:'D+', bg:'#113ccf',url:'disneyplus://'},
  {name:'Max',       ico:'MAX',bg:'#5822b4',url:'https://max.com'},
  {name:'Crunchyroll',ico:'CR',bg:'#f47521',url:'https://crunchyroll.com'},
  {name:'Globo AO VIVO',ico:'🔴',bg:'#0055aa',url:'https://globoplay.globo.com/ao-vivo/globo'},
  {name:'Twitter',   ico:'𝕏',  bg:'#111',   url:'https://twitter.com'},
  {name:'Reddit',    ico:'R',  bg:'#ff4500',url:'https://reddit.com'},
  {name:'YouTube TV',ico:'📺', bg:'#333',   url:'https://tv.youtube.com'},
  {name:'UOL',       ico:'UOL',bg:'#ff6600',url:'https://uol.com.br'},
  {name:'Esportes',  ico:'⚽', bg:'#009922',url:'https://ge.globo.com'},
  {name:'Maps',      ico:'📍', bg:'#34a853',url:'https://maps.google.com'},
];

let focusIdx=0;

// Relógio
function tick(){
  const n=new Date();
  document.getElementById('clock').textContent=
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  const d=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'],m=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  document.getElementById('date-str').textContent=`${d[n.getDay()]}, ${n.getDate()} de ${m[n.getMonth()]}`;
}
tick();setInterval(tick,15000);

// Build grid
function buildGrid(){
  document.getElementById('apps-grid').innerHTML=APPS.map((a,i)=>`
    <div class="app${i===0?' focused':''}" id="a${i}">
      <div class="app-ico" style="background:${a.bg}">${a.ico}</div>
      <div class="app-name">${a.name}</div>
    </div>`).join('');
}
buildGrid();

// Foco / cursor
function setFocus(idx){
  document.getElementById(`a${focusIdx}`)?.classList.remove('focused');
  focusIdx=(idx+APPS.length)%APPS.length;
  document.getElementById(`a${focusIdx}`)?.classList.add('focused');
  moveCursor();
}

const cur=document.getElementById('cursor');
function moveCursor(){
  const el=document.getElementById(`a${focusIdx}`);
  if(!el){cur.style.display='none';return;}
  const r=el.getBoundingClientRect();
  cur.style.display='block';
  cur.style.left=(r.left-6)+'px';cur.style.top=(r.top-6)+'px';
  cur.style.width=(r.width+12)+'px';cur.style.height=(r.height+12)+'px';
  el.scrollIntoView({block:'nearest',behavior:'smooth'});
}
moveCursor();

// Launch overlay
let launchTimer;
function launch(idx){
  const a=APPS[idx];
  document.getElementById('l-ico').textContent=a.ico;
  document.getElementById('l-name').textContent=a.name;
  const fill=document.getElementById('l-fill');
  fill.style.transition='none';fill.style.width='0';
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      fill.style.transition='width 2.2s ease';fill.style.width='100%';
    });
  });
  document.getElementById('launch').classList.add('on');
  clearTimeout(launchTimer);
  launchTimer=setTimeout(()=>document.getElementById('launch').classList.remove('on'),3200);
}

// Toast
let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('on'),2500);
}

// ── BroadcastChannel: recebe comandos do celular ──
// Celular e TV devem estar na mesma origem (mesmo host)
const bc=new BroadcastChannel('overblockk_tv');
bc.onmessage=(e)=>{
  const msg=e.data;
  const cols=8;
  switch(msg.t){
    case 'up':   setFocus(focusIdx-cols); break;
    case 'down': setFocus(focusIdx+cols); break;
    case 'left': setFocus(focusIdx-1);   break;
    case 'right':setFocus(focusIdx+1);   break;
    case 'ok':
      launch(focusIdx);
      // Manda URL pro celular abrir
      bc.postMessage({t:'open',url:APPS[focusIdx].url,name:APPS[focusIdx].name});
      break;
    case 'toast': toast(msg.text); break;
  }
};

// Teclado (pra testar no PC)
window.addEventListener('keydown',e=>{
  const cols=8;
  if(e.key==='ArrowRight') setFocus(focusIdx+1);
  else if(e.key==='ArrowLeft') setFocus(focusIdx-1);
  else if(e.key==='ArrowDown') setFocus(focusIdx+cols);
  else if(e.key==='ArrowUp') setFocus(focusIdx-cols);
  else if(e.key==='Enter'){launch(focusIdx);bc.postMessage({t:'open',url:APPS[focusIdx].url,name:APPS[focusIdx].name});}
});
</script>
</body>
</html>
